name: produce
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "facts, comments, or money"
        required: false
        default: "facts"
      privacy:
        description: "private or public (manual runs)"
        required: false
        default: "private"
  schedule:
    # 2 facts (DustMust) + 2 money (Fun Honey) per day, auto-published, staggered
    # so no two publish at the same time (times are UTC; TR = UTC+3).
    - cron: "0 9 * * *"    # facts (DustMust)  12:00 Türkiye
    - cron: "0 11 * * *"   # money (Fun Honey) 14:00 Türkiye
    - cron: "0 15 * * *"   # facts (DustMust)  18:00 Türkiye
    - cron: "0 17 * * *"   # money (Fun Honey) 20:00 Türkiye

permissions:
  contents: write

jobs:
  produce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Install root render deps
        run: npm install
      - name: Install Remotion deps
        run: cd remotion && npm install
      - name: Resolve mode + privacy
        id: cfg
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 11 * * *"|"0 17 * * *") M=money ;;
              *) M=facts ;;
            esac
            P=public
          else
            M="${{ inputs.mode || 'facts' }}"
            P="${{ inputs.privacy || 'private' }}"
          fi
          echo "mode=$M" >> "$GITHUB_OUTPUT"
          echo "privacy=$P" >> "$GITHUB_OUTPUT"
          echo "Resolved mode=$M privacy=$P"
      - name: Run pipeline (topic -> render)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODE: ${{ steps.cfg.outputs.mode }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node pipeline/run.js
      - name: Capture run id
        id: runid
        run: echo "id=$(ls -t run | head -1)" >> "$GITHUB_OUTPUT"
      - name: Upload video artifact (rendered short)
        uses: actions/upload-artifact@v4
        with:
          name: short-${{ steps.runid.outputs.id }}
          path: out/${{ steps.runid.outputs.id }}.mp4
      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YT_COMMENTS_REFRESH_TOKEN: ${{ secrets.YT_COMMENTS_REFRESH_TOKEN }}
        run: |
          ID=${{ steps.runid.outputs.id }}
          MODE="${{ steps.cfg.outputs.mode }}"
          PRIV="${{ steps.cfg.outputs.privacy }}"
          if [ "$MODE" = "facts" ]; then RT=YOUTUBE_REFRESH_TOKEN; else RT=YT_COMMENTS_REFRESH_TOKEN; fi
          echo "mode=$MODE privacy=$PRIV token=$RT"
          python scripts/upload_youtube.py upload \
            --video out/$ID.mp4 \
            --meta run/$ID/meta.json \
            --privacy $PRIV \
            --refresh-token-env $RT \
            --out run/$ID/upload.json
          cat run/$ID/upload.json
      - name: Persist upload result + history
        run: |
          ID=${{ steps.runid.outputs.id }}
          node -e "const fs=require('fs');const u=require('./run/'+process.env.ID+'/upload.json');const h=require('./state/history.json');const e=h.entries.find(x=>x.runId===process.env.ID);if(e){e.video_id=u.video_id;e.url=u.url;if(u.privacy==='public')e.status='published';}fs.writeFileSync('state/history.json',JSON.stringify(h,null,2));"
        env: { ID: "${{ steps.runid.outputs.id }}" }
      - name: Commit state
        run: |
          git config user.name "remo-bot"
          git config user.email "bot@remo"
          git add state/history.json run/${{ steps.runid.outputs.id }}/upload.json || true
          git commit -m "run ${{ steps.runid.outputs.id }} uploaded (private)" || echo "nothing to commit"
          git push || echo "push skipped"
